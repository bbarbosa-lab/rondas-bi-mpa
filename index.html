<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rondas BI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-900 rounded-2xl mx-auto flex items-center justify-center mb-4">
                <span class="text-white font-bold text-3xl">VA</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Rondas BI</h1>
            <p class="text-gray-500 mt-1">Sistema de Gestão de Programações</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input type="email" id="email" value="admin@vizinho.local" required
                       class="w-full border border-gray-300 focus:border-blue-500 rounded-2xl px-4 py-3 text-sm">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="password" value="admin123" required
                       class="w-full border border-gray-300 focus:border-blue-500 rounded-2xl px-4 py-3 text-sm">
            </div>

            <button type="submit"
                    class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold py-3.5 rounded-2xl transition text-sm">
                Entrar no Sistema
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-6">
            Versão MVP • Acesso restrito
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);

                const response = await fetch('http://localhost:8000/token', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Credenciais inválidas');
                }

                const data = await response.json();
                
                // Salva token e usuário
                saveAuth(data.access_token, { email: email });
                
                // Redireciona para o Dashboard
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                alert('Erro ao fazer login: ' + error.message);
            }
        });
    </script>
</body>
</html>
